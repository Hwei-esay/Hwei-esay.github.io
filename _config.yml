# -----------------------------
# Jekyll Site DIY Config
# 这个文件是站点的总配置，下面保留了较多注释，方便你后续自己改。
# GitHub Pages 用户名仓库（例如 https://yourname.github.io）通常使用空 baseurl。
# 如果你以后改成项目仓库（例如 https://yourname.github.io/my-site），
# 再把 baseurl 改为 "/my-site" 即可。
# -----------------------------

title: "Lin's Signals"
email: "hello@example.com" # TODO: 改成你的邮箱
description: >-
  一个用于写短博客、记录灵感、沉淀教程与学术报告笔记的个人 Jekyll 站点。
  设计保持简洁，但带一点炫彩和层次感，适合长期使用与 GitHub Pages 部署。

# 站点正式域名。
# 用户名仓库一般写成 https://你的用户名.github.io
url: "https://yourusername.github.io" # TODO: 改成你的 GitHub Pages 域名

# 用户名仓库保持空字符串；项目仓库才需要写成 "/repo-name"
baseurl: ""

lang: "zh-CN"
timezone: "Asia/Shanghai"

# 站点署名信息，便于模板引用
author:
  name: "Your Name" # TODO: 改成你的名字
  title: "Builder / Learner / Research Note Taker"
  bio: "喜欢把零散经验整理成可复用的知识，把问题讲清楚，也把成长记录下来。"
  github: "yourusername" # TODO: 改成你的 GitHub 用户名

# 导航配置：可直接增删，header 会自动渲染
navigation:
  - title: "首页"
    url: "/"
  - title: "博客"
    url: "/blog/"
  - title: "感悟"
    url: "/moments/"
  - title: "教程"
    url: "/tutorials/"
  - title: "学术"
    url: "/academia/"
  - title: "关于"
    url: "/about/"

# 首页展示的内容数量
home:
  featured_posts: 3
  featured_moments: 6
  featured_tutorials: 4
  featured_reports: 4

# 社交链接。需要哪个留哪个，不需要可删掉整行。
social:
  github: "https://github.com/yourusername" # TODO: 改成你的 GitHub 主页
  email: "mailto:hello@example.com" # TODO: 改成你的邮箱

# 自定义集合，用来区分不同内容形态
collections:
  moments:
    output: true
    permalink: /moments/:name/
  tutorials:
    output: true
    permalink: /tutorials/:name/
  academia:
    output: true
    permalink: /academia/:name/

# 默认 front matter，减少重复配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      section: "blog"
  - scope:
      path: ""
      type: "moments"
    values:
      layout: "moment"
      section: "moments"
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "note"
      section: "tutorials"
  - scope:
      path: ""
      type: "academia"
    values:
      layout: "note"
      section: "academia"

# Markdown 和高亮
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

# 常见构建设置
permalink: /blog/:year/:month/:day/:title/
paginate: 6
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# 构建时忽略的文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
