# -----------------------------
# Jekyll Site DIY Config
# 这个文件是站点的总配置，下面保留了较多注释，方便你后续自己改。
# GitHub Pages 用户名仓库（例如 https://yourname.github.io）通常使用空 baseurl。
# 如果你以后改成项目仓库（例如 https://yourname.github.io/my-site），
# 再把 baseurl 改为 "/my-site" 即可。
# -----------------------------

title: "Hwei's Signals"
email: "2499032660@qq.com"
description: >-
  一个用于写短博客、记录灵感、沉淀教程与学术报告笔记的个人 Jekyll 站点。
  设计保持简洁，但带一点炫彩和层次感，适合长期使用与 GitHub Pages 部署，并与 AI 协作完成。

# 站点正式域名。
# 用户名仓库一般写成 https://你的用户名.github.io
url: "https://hwei-esay.github.io"

# 用户名仓库保持空字符串；项目仓库才需要写成 "/repo-name"
baseurl: ""

lang: "zh-CN"
timezone: "Asia/Shanghai"

# 站点署名信息，便于模板引用
author:
  name: "Haowei Guo"
  title: "Hwei's Signals"
  bio: "喜欢把零散经验整理成可复用的知识，把问题讲清楚，也把成长记录下来。"
  github: "Hwei-esay"

# 可见站点 section 由 _data/sections.yml 统一维护。

# 社交链接。需要哪个留哪个，不需要可删掉整行。
social:
  github: "https://github.com/Hwei-esay"
  email: "mailto:2499032660@qq.com"

# 自定义集合，用来区分不同内容形态
collections:
  moments:
    output: true
    permalink: /moments/:name/
  tutorials:
    output: true
    permalink: /tutorials/:name/
  skills:
    output: true
    permalink: /skills/:name/
  academia:
    output: true
    permalink: /academia/:name/

# 默认 front matter，减少重复配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      section: "blog"
  - scope:
      path: ""
      type: "moments"
    values:
      layout: "moment"
      section: "moments"
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "note"
      section: "tutorials"
  - scope:
      path: ""
      type: "skills"
    values:
      layout: "note"
      section: "skills"
  - scope:
      path: ""
      type: "academia"
    values:
      layout: "note"
      section: "academia"

# Markdown 和高亮
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

# 常见构建设置
permalink: /blog/:year/:month/:day/:title/
paginate: 6
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# 构建时忽略的文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
