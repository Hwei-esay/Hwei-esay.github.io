---
layout: default
---

<article class="content-page article-page{% if page.section == 'skills' %} content-page--skills{% endif %}">
  <header class="page-header">
    <p class="command-line"><span class="prompt-symbol">$</span> cat ./{{ page.section | default: 'notes' }}/{{ page.slug }}.md</p>
    <h1>&gt; {{ page.title }}_</h1>
    {% include article-meta.html %}
  </header>
  {% if page.summary %}
    <p class="summary-box">{{ page.summary }}</p>
  {% endif %}
  <div class="article-layout">
    <aside class="toc-panel" aria-label="Table of contents">
      <p class="panel-label">on_this_page</p>
      <nav id="article-toc"><span class="muted">indexing...</span></nav>
    </aside>
    <div class="prose article-content">
      {{ content }}
    </div>
  </div>
</article>
