---
layout: default
---

<article class="content-page{% if page.section == 'skills' %} content-page--skills{% endif %}">
  <header class="page-header">
    <p class="eyebrow">{{ page.section | default: 'Notes' | upcase }}</p>
    <h1>{{ page.title }}</h1>
    {% include article-meta.html %}
  </header>
  {% if page.summary %}
    <div class="summary-box">{{ page.summary }}</div>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
