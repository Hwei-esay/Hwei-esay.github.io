---
layout: default
---

<article class="content-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.section | default: 'Notes' | upcase }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>
  {% if page.summary %}
    <div class="summary-box">{{ page.summary }}</div>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
