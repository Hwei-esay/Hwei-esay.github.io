---
layout: default
---

<article class="content-page json-window{% if page.section == 'skills' %} content-page--skills{% endif %}">
  <div class="terminal-bar">
    <span></span><span></span><span></span>
    <strong>{{ page.section | default: 'note' }}.json</strong>
  </div>
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% include article-meta.html %}
  </header>
  {% if page.summary %}
    <p class="summary-box">{{ page.summary }}</p>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
</article>
