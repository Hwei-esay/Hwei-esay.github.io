---
layout: default
---

<section class="content-page static-page{% if page.url == '/links/' %} links-page{% endif %}{% if page.url == '/404.html' %} error-page{% endif %}">
  <header class="page-header">
    <h1>&gt; {{ page.title | downcase }}_</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</section>
