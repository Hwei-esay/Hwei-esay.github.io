---
layout: default
---

<article class="content-page json-window moment-page">
  <div class="terminal-bar">
    <span></span><span></span><span></span>
    <strong>moment.json</strong>
  </div>
  <header class="page-header">
    <p class="eyebrow">"moment"</p>
    <h1>{{ page.title }}</h1>
    {% include article-meta.html %}
  </header>
  <div class="json-meta">
    <p><span class="json-punct">{</span></p>
    <p><span class="json-key">"title"</span><span class="json-punct">:</span> <span class="json-value">"{{ page.title }}"</span><span class="json-punct">,</span></p>
    <p><span class="json-key">"content"</span><span class="json-punct">:</span> <span class="json-punct">{</span></p>
  </div>
  <div class="prose">
    {{ content }}
  </div>
  <div class="json-meta">
    <p><span class="json-punct">}</span></p>
    <p><span class="json-punct">}</span></p>
  </div>
</article>
