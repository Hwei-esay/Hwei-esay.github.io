---
layout: default
---

<article class="content-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.section | default: 'Blog' | upcase }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
