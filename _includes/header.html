<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}">
    <span class="brand-mark"></span>
    <span>
      <strong>{{ site.title }}</strong>
      <small>{{ site.author.title }}</small>
    </span>
  </a>

  <nav class="site-nav" aria-label="Main Navigation">
    <span class="json-punct">{</span>
    {% assign nav_items = site.data.sections | where: "nav", true %}
    {% for item in nav_items %}
      <a href="{{ item.url | relative_url }}"><span class="json-key">"{{ item.title }}"</span><span class="json-punct">:</span> <span class="json-value">"{{ item.url }}"</span></a>{% unless forloop.last %}<span class="json-punct">,</span>{% endunless %}
    {% endfor %}
    <span class="json-punct">}</span>
  </nav>
</header>
